<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Poll — Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&family=Fira+Code:wght@400;500&family=Press+Start+2P&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/poll-themes.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <style>
    /* Poll-only window: fully transparent, no chrome */
    html, body {
      margin: 0; padding: 0;
      background: transparent !important;
      overflow: hidden;
      width: 100vw; height: 100vh;
      user-select: none;
    }
    /* Full-height wrapper — entire surface is the drag region */
    #poll-wrapper {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    #poll-container {
      width: 100%; height: 100%;
      box-sizing: border-box;
      -webkit-app-region: drag;
    }
    /* Click-through indicator */
    #click-through-indicator {
      position: fixed;
      bottom: 6px; right: 8px;
      background: rgba(248,113,113,0.15);
      border: 1px solid rgba(248,113,113,0.4);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 10px;
      color: rgba(248,113,113,0.9);
      pointer-events: none;
      -webkit-app-region: no-drag;
    }
  </style>
</head>
<body>
  <!-- Poll content — entire window is drag-to-move -->
  <div id="poll-wrapper">
    <div id="poll-container" class="theme-glassmorphism">
      <!-- Status Bar -->
      <div id="poll-status-bar">
        <div id="status-dot" class="status-dot idle"></div>
        <span id="status-label">Idle</span>
        <span id="total-votes-display"></span>
      </div>

      <!-- Question -->
      <div id="poll-question" class="poll-question">Configure your poll in settings</div>

      <!-- Options (rendered dynamically) -->
      <div id="poll-options" class="poll-options"></div>

      <!-- Action Controls -->
      <div id="poll-overlay-controls" style="display: flex; gap: 8px; margin-top: 16px; justify-content: center;">
        <button id="btn-stop-poll" class="hidden" style="background: rgba(239, 68, 68, 0.9); border: none; padding: 8px 16px; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">⏹ Stop</button>
        <button id="btn-next-poll" class="hidden" style="background: rgba(99, 102, 241, 0.9); border: none; padding: 8px 16px; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">⏭ Next</button>
      </div>
    </div>
  </div>

  <!-- Click-through indicator -->
  <div id="click-through-indicator" class="hidden">Click-Through ON</div>

  <script src="js/poll-overlay.js"></script>
</body>
</html>
